name: Flutter Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: main-release
  cancel-in-progress: false

jobs:
  release-apk:
    name: Build and publish release APK
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Prepare release branch
        run: git checkout -B main "${GITHUB_SHA}"

      - name: Resolve release label
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const supportedLabels = ['release:patch', 'release:minor', 'release:major'];
            const { owner, repo } = context.repo;
            const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: context.sha,
            });

            const candidates = result.data.filter((pr) => pr.merged_at && pr.base.ref === 'main');
            if (candidates.length === 0) {
              throw new Error(`No merged pull request targeting main was found for commit ${context.sha}. Add a supported release label to the PR and merge through a pull request.`);
            }

            const pr = candidates[0];
            const { data: prDetails } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr.number,
            });
            const labelNames = prDetails.labels.map((label) => label.name);
            const releaseLabels = labelNames.filter((name) => supportedLabels.includes(name));
            if (releaseLabels.length !== 1) {
              throw new Error(`PR #${pr.number} must have exactly one release label: ${supportedLabels.join(', ')}. Found: ${releaseLabels.length ? releaseLabels.join(', ') : 'none'}.`);
            }

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('label', releaseLabels[0]);
            core.setOutput('bump', releaseLabels[0].replace('release:', ''));

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version_line="$(grep -E '^version: [0-9]+\.[0-9]+\.[0-9]+\+[0-9]+$' pubspec.yaml)"
          current_version="${version_line#version: }"
          semver="${current_version%+*}"
          build_number="${current_version#*+}"

          IFS='.' read -r major minor patch <<< "$semver"

          case "${{ steps.release.outputs.bump }}" in
            patch)
              patch=$((patch + 1))
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            *)
              echo "Unsupported release bump: ${{ steps.release.outputs.bump }}"
              exit 1
              ;;
          esac

          next_version="${major}.${minor}.${patch}"
          next_build=$((build_number + 1))
          tag_name="v${next_version}"
          apk_name="qroster-${tag_name}-release.apk"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" >/dev/null 2>&1; then
            echo "Tag ${tag_name} already exists."
            exit 1
          fi

          sed -i "s/^version: .*/version: ${next_version}+${next_build}/" pubspec.yaml

          echo "current_version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "next_version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "next_build=${next_build}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${apk_name}" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Commit release version
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore(release): ${{ steps.version.outputs.tag_name }} [skip release]"

      - name: Build release APK
        run: >
          flutter build apk --release
          --build-name "${{ steps.version.outputs.next_version }}"
          --build-number "${{ steps.version.outputs.next_build }}"

      - name: Rename APK
        run: >
          cp build/app/outputs/flutter-apk/app-release.apk
          build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}

      - name: Push release commit and tag
        shell: bash
        run: |
          set -euo pipefail

          git tag "${{ steps.version.outputs.tag_name }}"
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag_name }}"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qroster-release-apk
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "${{ steps.version.outputs.tag_name }}"
          "build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}"
          --title "Qroster ${{ steps.version.outputs.next_version }}"
          --notes "Q名册 Android release APK，由 PR #${{ steps.release.outputs.pr_number }} 的 ${{ steps.release.outputs.label }} 标签触发自动构建。"
