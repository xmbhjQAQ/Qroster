name: Flutter CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  analyze-test-build:
    name: Analyze, test, and build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release label
        if: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' }}
        uses: actions/github-script@v7
        with:
          script: |
            const supportedLabels = ['release:patch', 'release:minor', 'release:major'];
            const labelNames = context.payload.pull_request.labels.map((label) => label.name);
            const releaseLabels = labelNames.filter((name) => supportedLabels.includes(name));
            if (releaseLabels.length !== 1) {
              throw new Error(`Pull requests into main must have exactly one release label: ${supportedLabels.join(', ')}. Found: ${releaseLabels.length ? releaseLabels.join(', ') : 'none'}.`);
            }

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: qroster-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
